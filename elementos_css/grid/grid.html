<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementos CSS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="card.css">
</head>
<body>
    <header>
        <h1>Grid</h1>
    </header>
    <main>
        <div class="demo-container">
            <div class="grid-demo">
                <button onclick="addColumn()">Agregar Columnas</button>
                <div></div>
                <div></div>
                <button onclick="removeColumn()">Quitar Columnas</button>
            </div>
            <div class="card">
                <div class="header">
                    <div class="top">
                        <div class="circle"><span class="red circle2"></span></div>
                        <div class="circle"><span class="yellow circle2"></span></div>
                        <div class="circle"><span class="green circle2"></span></div>
                        <div class="title">
                            <p id="title2">CSS</p>
                        </div>
                    </div>
                </div>

            <div class="code-container">
            <textarea class="area" id="code" name="code" readonly>
.grid-demo {
    display: grid;
    grid-template-columns: repeat(2, 1fr); <-Cambia-
    grid-template-rows: repeat(2, 1fr);
    gap: 1em;
    margin-top: 2em;

    > * {
        aspect-ratio: 1 / 1;
        width: 100px;
    }

    div {
        background-color: #007BFF;
        color: white;
        text-align: center;
    }
}


            </textarea>
            </div>
        </div>
                    <div class="card">

                        <div class="circle"><span class="green circle2"></span></div>
                        <div class="title">
                            <p id="title2">HTML</p>
                        </div>
                    </div>
                </div>

            <div class="code-container">
            <textarea class="area" id="code" name="code" readonly>

&lt;/div&gt;
            </textarea>
            </div>
        </div>

        </div>

    </main>
    <script src="script.js"></script>
</body>
</html>
