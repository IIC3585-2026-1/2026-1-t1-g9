<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementos CSS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="card.css">
</head>
<body>
    <header>
        <h1>Transiciones</h1>
    </header>

    <main>
        <div class="demo-container">
            <section class="transition-demo">
                <div class="transition-grid">
                    <div class="transition-item">
                        <button class="transition-button ease" type="button">Ease</button>
                    </div>

                    <div class="transition-item">
                        <button class="transition-button linear" type="button">Linear</button>
                    </div>

                    <div class="transition-item">
                        <button class="transition-button steps" type="button">Steps</button>
                    </div>

                    <div class="transition-item">
                        <button class="transition-button bezier" type="button">Cubic-beizer</button>
                    </div>
                </div>
            </section>

            <div class="card">
                <div class="header">
                    <div class="top">
                        <div class="circle"><span class="red circle2"></span></div>
                        <div class="circle"><span class="yellow circle2"></span></div>
                        <div class="circle"><span class="green circle2"></span></div>
                        <div class="title">
                            <p class="title-text">CSS</p>
                        </div>
                    </div>
                </div>

                <div class="code-container">
                    <textarea class="area" id="css-code" name="css-code" readonly>
.transition-button {
    background-color: #007BFF;
    color: white;
    transform: scale(1);
    transition-property: background-color, transform;
    transition-duration: 1.2s;
}

.transition-button:hover {
    background-color: #0056b3;
    transform: scale(1.2);
}

.ease {
    transition-timing-function: ease;
}

.linear {
    transition-timing-function: linear;
}

.steps {
    transition-timing-function: steps(4, end);
}

.bezier {
    transition-timing-function: cubic-bezier(0.68, -0.6, 0.32, 1.6);
}
                    </textarea>
                </div>
            </div>

            <div class="card">
                <div class="header">
                    <div class="top">
                        <div class="circle"><span class="red circle2"></span></div>
                        <div class="circle"><span class="yellow circle2"></span></div>
                        <div class="circle"><span class="green circle2"></span></div>
                        <div class="title">
                            <p class="title-text">HTML</p>
                        </div>
                    </div>
                </div>

                <div class="code-container">
                    <textarea class="area" id="html-code" name="html-code" readonly>
&lt;div class="transition-item"&gt;
    &lt;p&gt;Ease&lt;/p&gt;
    &lt;button class="transition-button ease" type="button"&gt;Hover&lt;/button&gt;
&lt;/div&gt;

&lt;div class="transition-item"&gt;
    &lt;p&gt;Linear&lt;/p&gt;
    &lt;button class="transition-button linear" type="button"&gt;Hover&lt;/button&gt;
&lt;/div&gt;

&lt;div class="transition-item"&gt;
    &lt;p&gt;Steps&lt;/p&gt;
    &lt;button class="transition-button steps" type="button"&gt;Hover&lt;/button&gt;
&lt;/div&gt;

&lt;div class="transition-item"&gt;
    &lt;p&gt;Cubic-bezier&lt;/p&gt;
    &lt;button class="transition-button bezier" type="button"&gt;Hover&lt;/button&gt;
&lt;/div&gt;
                    </textarea>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
