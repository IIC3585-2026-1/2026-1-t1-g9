<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementos CSS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="card.css">
</head>
<body>
    <header>
        <h1>Animaciones</h1>
    </header>

    <main>
        <div class="demo-container">
            <section class="animation-demo">
                <button class="animation-button" id="animation-button" type="button">Animación</button>
            </section>

            <div class="card">
                <div class="header">
                    <div class="top">
                        <div class="circle"><span class="red circle2"></span></div>
                        <div class="circle"><span class="yellow circle2"></span></div>
                        <div class="circle"><span class="green circle2"></span></div>
                        <div class="title">
                            <p class="title-text">CSS</p>
                        </div>
                    </div>
                </div>

                <div class="code-container">
                    <textarea class="area" id="css-code" name="css-code" readonly>
.animation-button.is-animating {
    animation: demo-sequence 3.2s ease-in-out;
}

@keyframes demo-sequence {
    0% {
        transform: rotate(0deg) scale(1, 1);
        background-color: #007BFF;
    }
    35% {
        transform: rotate(1080deg) scale(1, 1);
        background-color: #7b2cff;
    }
    50% {
        transform: rotate(1080deg) scale(1, 1);
        background-color: #00a6a6;
    }
    65% {
        transform: rotate(1080deg) scale(1.35, 0.7);
        background-color: #ff7a00;
    }
    82% {
        transform: rotate(1080deg) scale(1.55, 1.55);
        background-color: #ff3d71;
    }
    100% {
        transform: rotate(0deg) scale(1, 1);
        background-color: #007BFF;
    }
}
                    </textarea>
                </div>
            </div>

            <div class="card">
                <div class="header">
                    <div class="top">
                        <div class="circle"><span class="red circle2"></span></div>
                        <div class="circle"><span class="yellow circle2"></span></div>
                        <div class="circle"><span class="green circle2"></span></div>
                        <div class="title">
                            <p class="title-text">HTML</p>
                        </div>
                    </div>
                </div>

                <div class="code-container">
                    <textarea class="area" id="html-code" name="html-code" readonly>
&lt;button class="animation-button" id="animation-button" type="button"&gt;
    Animación
&lt;/button&gt;
                    </textarea>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
