<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementos CSS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="card.css">
</head>
<body>

<header>
    <h1>Flexbox</h1>
</header>

<main>
    <div class="demo-container">
        <div class="flexbox-wrapper">
            <div class="flexbox-demo">
                <button onclick="switchDirection()">Cambiar Dirección</button>
                <div></div>
                <div></div>
                <div></div>
            </div>
        </div>

        <div class="card">
            <div class="header">
                <div class="top">
                    <div class="circle"><span class="red circle2"></span></div>
                    <div class="circle"><span class="yellow circle2"></span></div>
                    <div class="circle"><span class="green circle2"></span></div>
                    <div class="title">
                        <p id="title2">CSS</p>
                    </div>
                </div>
            </div>

            <div class="code-container">
                <textarea class="area" id="code" name="code" readonly>
.flexbox-demo {
    display: flex;
    flex-direction: row;*CAMBIA
    gap: 1em;
    margin-top: 2em;

    > * {
        aspect-ratio: 1 / 1;
        width: 100px;
    }

    button {
        background-color: #007BFF;
        color: white;
        cursor: pointer;
    }

    div {
        background-color: #007BFF;
        color: white;
        text-align: center;
    }
}
                </textarea>
            </div>

        </div>

        <div class="card">
            <div class="header">
                <div class="top">
                    <div class="circle"><span class="red circle2"></span></div>
                    <div class="circle"><span class="yellow circle2"></span></div>
                    <div class="circle"><span class="green circle2"></span></div>
                    <div class="title">
                        <p id="title2">HTML</p>
                    </div>
                </div>
            </div>

            <div class="code-container">
                <textarea class="area" id="code" name="code" readonly>
&lt;div class="flexbox-demo"&gt;
    &lt;button onclick="switchDirection()"&gt;Cambiar Dirección&lt;/button&gt;
    &lt;div&gt;&lt;/div&gt;
    &lt;div&gt;&lt;/div&gt;
    &lt;div&gt;&lt;/div&gt;
&lt;/div&gt;
                </textarea>
            </div>

        </div>

    </div>
</main>

<script src="script.js"></script>
</body>
</html>
